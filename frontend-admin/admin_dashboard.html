<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Staff Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/design/admin_dashboard.css">

</head>

<body>

    <header class="top-navbar">

        <div class="logo-section">
            <div class="logo-box"></div>
            <span>VANITY CREATION</span>
        </div>

        <div class="navbar-right">

            <button class="notification-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
            </button>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search photos by tag, email, or file name">
            </div>
            <div class="user-profile">

                <img id="userAvatar" class="avatar" src="https://via.placeholder.com/42" alt="Profile">

                <span id="userName">
                    Loading...
                </span>

            </div>
        </div>

    </header>


    <div class="dashboard-wrapper">


        <aside class="sidebar">

            <nav>

                <a href="admin_dashboard.html" class="active">
                    <i class="fa-solid fa-table-cells-large"></i>
                    Home
                </a>

                <a href="admin_client.html">
                    <i class="fa-solid fa-users"></i>
                    Clients
                </a>

                <a href="admin_repository.html">
                    <i class="fa-solid fa-book"></i>
                    Repository
                </a>

                <a href="admin_payment.html">
                    <i class="fa-solid fa-credit-card"></i>
                    Payments
                </a>

                <a href="admin_archives.html">
                    <i class="fa-solid fa-box-archive"></i>
                    Archives
                </a>

                <a href="admin_profile.html">
                    <i class="fa-solid fa-user"></i>
                    Profile
                </a>

                <a href="admin_settings.html">
                    <i class="fa-solid fa-gear"></i>
                    Settings
                </a>

            </nav>

            <a href="admin_login.html" class="logout-btn" id="logoutBtn">

                <i class="fa-solid fa-arrow-right-from-bracket logout-icon"></i>

                <span>Log out</span>

            </a>

        </aside>
        <main class="content">

            <div class="page-header">
                <h1>Welcome back!</h1>
                <p>See the latest updates on your work.</p>
            </div>

            <div class="stats-grid">

                <div class="card">
                    <i class="fa-solid fa-users"></i>
                    <span>Total Customers</span>
                    <h2 id="totalCustomers">0</h2>
                </div>

                <div class="card">
                    <i class="fa-solid fa-folder"></i>
                    <span>Total Folders</span>
                    <h2 id="totalFolders">0</h2>
                </div>

                <div class="card">
                    <i class="fa-solid fa-image"></i>
                    <span>Total Photos</span>
                    <h2 id="totalPhotos">0</h2>
                </div>

                <div class="card">
                    <i class="fa-solid fa-circle-check green"></i>
                    <span>Active</span>
                    <h2 id="activeSessions">0</h2>
                </div>

                <div class="card">
                    <i class="fa-solid fa-circle-xmark red"></i>
                    <span>Expired</span>
                    <h2 id="expiredSessions">0</h2>
                </div>

            </div>

            <h3 class="section-title">
                Recent Stored Sessions
            </h3>

            <div class="sessions-panel" id="sessionsPanel">
                <div class="empty-state">
                    Analytics
                </div>
            </div>

        </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



    <script>
       const SUPABASE_URL = "https://rprcbeabdvxdenmngxxc.supabase.co";

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmNiZWFiZHZ4ZGVubW5neHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTAxMTgsImV4cCI6MjA5ODg4NjExOH0.SS0BKTXRBiu1Cclr_1ZRvte4UNnevinwqJAKOX9tLvw";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );
        window.addEventListener("load", async () => {

            try {


                const params = new URLSearchParams(window.location.search);

                if (params.get("error")) {
                    alert(params.get("error_description") || "Login failed");
                    window.location.href = "admin_login.html";
                    return;
                }


                const {
                    data: { session }
                } = await supabaseClient.auth.getSession();

                if (!session) {
                    window.location.href = "admin_login.html";
                    return;
                }

                const user = session.user;

                let { data: profile, error } = await supabaseClient
                    .from("staff_profiles")
                    .select("*")
                    .eq("id", user.id)
                    .single();

                if (error && error.code !== "PGRST116") {
                    console.error(error);
                }

                if (!profile) {

                    const { data: newProfile, error: insertError } =
                        await supabaseClient
                            .from("staff_profiles")
                            .insert([{
                                id: user.id,
                                email: user.email,
                                full_name:
                                    user.user_metadata?.full_name ||
                                    user.user_metadata?.name ||
                                    "Staff User",
                                avatar_url:
                                    user.user_metadata?.avatar_url || "",
                                role: "staff",
                                verified: true
                            }])
                            .select()
                            .single();

                    if (insertError) {
                        console.error(insertError);
                        alert("Unable to create profile.");
                        return;
                    }

                    profile = newProfile;
                }


                if (profile.verified === false) {
                    alert("Waiting for admin approval");
                    window.location.href = "verification_code.html";
                    return;
                }

                document.getElementById("userName").textContent =
                    profile.full_name;
                await loadDashboardStats(user.id);

                await loadRecentSessions(user.id);

                if (profile.avatar_url) {
                    document.getElementById("userAvatar").src =
                        profile.avatar_url;
                }

            } catch (err) {
                console.error(err);
                alert("Something went wrong.");
            }

        });
        async function loadDashboardStats(userId) {

            try {

                const { count: customers } =
                    await supabaseClient
                        .from("clients")
                        .select("*", { count: "exact", head: true })
                        .eq("user_id", userId);

                document.getElementById("totalCustomers")
                    .textContent = customers || 0;


                const { count: folders } =
                    await supabaseClient
                        .from("folders")
                        .select("*", { count: "exact", head: true })
                        .eq("user_id", userId);

                document.getElementById("totalFolders").textContent = folders || 0;
                    

                const { count: photos } =
                    await supabaseClient
                        .from("photos")
                        .select("*", { count: "exact", head: true })
                        .eq("user_id", userId);

                document.getElementById("totalPhotos")
                    .textContent = photos || 0;


                const { count: active } =
                    await supabaseClient
                        .from("clients")
                        .select("*", { count: "exact", head: true })
                        .eq("user_id", userId)
                        .eq("status", "active");
                document.getElementById("activeSessions").textContent = active || 0;


                const { count: expired } =
                    await supabaseClient
                        .from("clients")
                        .select("*", { count: "exact", head: true })
                        .eq("user_id", userId)
                        .eq("status", "expired");

                document.getElementById("expiredSessions").textContent = expired || 0;   


            } catch (error) {

                console.error(error);

            }
        }
        async function loadRecentSessions(userId) {

            const container = document.getElementById("sessionsPanel");

            try {

                const { data, error } =
                    await supabaseClient
                        .from("photos")
                        .select("*")
                        .eq("user_id", userId)
                        .order("created_at", { ascending: false })
                        .limit(10);

                if (error) throw error;

                if (!data || data.length === 0) {

                    container.innerHTML = `
                <div class="empty-state">
                    No uploaded sessions yet.
                </div>
            `;

                    return;
                }

                container.innerHTML = "";

                data.forEach(photo => {

                    container.innerHTML += `
                <div class="session-card">

                    <img
                        src="${photo.image_url}"
                        alt="${photo.file_name}"
                    >

                    <div class="session-info">

                        <h4>${photo.file_name}</h4>

                        <p>
                            ${new Date(
                        photo.created_at
                    ).toLocaleDateString()}
                        </p>

                    </div>

                </div>
            `;

                });

            } catch (error) {

                console.error(error);

            }
        }
        // Logout button
        document.getElementById("logoutBtn")
            .addEventListener("click", async (e) => {

                e.preventDefault();

                await supabaseClient.auth.signOut();

                window.location.href = "landing_page.html";
            });
    </script>
</body>

</html>
