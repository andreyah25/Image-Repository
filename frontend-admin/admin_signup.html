<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started - Vanity Creation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/design/admin_login.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="login-wrapper">

    <div class="top-accent-line"></div>

    <h1 class="welcome-heading">Get Started</h1>
    <p class="welcome-subtext">Create your account in seconds.</p>

    <div class="login-card-container">

      <form class="login-form" id="staffSignUpForm">

        <div class="input-group">
          <input type="text" id="fullName" autocomplete="name" required placeholder=" ">
          <label for="fullName">Full Name</label>
        </div>

        <div class="input-group">
          <input type="email" id="email" autocomplete="email" required placeholder=" ">
          <label for="email">Email Address</label>
        </div>

        <div class="input-group password-group">
          <input type="password" id="password" autocomplete="new-password" required placeholder=" ">
          <label for="password">Password</label>

          <button type="button" class="toggle-password" id="passwordToggle">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>

        <button type="submit" class="submit-login-btn">
          Sign up
        </button>

        <p class="signup-footer-text">
          Already have an account? <a href="staff_login.html">Log in</a>
        </p>

      </form>

    </div>

  </div>

  <script>


  </script>

</body>

</html>
