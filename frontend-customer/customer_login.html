<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Website Name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/design/customer_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <button class="icon-arrow" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div class="login-container">
        <div class="login-banner">
            <div class="banner-content">
                <h1 class="banner-title">Sign In to Continue</h1>
                <p class="banner-subtitle">Log in to book a session or view your private photo collection.</p>
            </div>
        </div>

        <div class="login-form-wrapper">
            <div class="login-form-container">
                <form class="login-form">

                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">Email Address</label>
                    </div>

                    <div class="input-group password-group">
                        <input type="password" id="password" required placeholder=" ">
                        <label for="password">Password</label>
                        <button type="button" class="toggle-password" id="toggle-password-btn"
                            aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye-slash"></i>
                        </button>
                    </div>

                    <div class="forgot-password-container">
                        <a href="#" class="forgot-password-link">Forgot Password</a>
                    </div>

                    <button type="submit" class="btn-login">Log in</button>

                    <div class="divider">
                        <span class="divider-text">or</span>
                    </div>

                    <button type="button" class="btn-google" id="google-login"> <svg class="google-icon"
                            viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Log in with Google
                    </button>

                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://rprcbeabdvxdenmngxxc.supabase.co";

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmNiZWFiZHZ4ZGVubW5neHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTAxMTgsImV4cCI6MjA5ODg4NjExOH0.SS0BKTXRBiu1Cclr_1ZRvte4UNnevinwqJAKOX9tLvw";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );
        const togglePasswordBtn = document.getElementById("toggle-password-btn");
        const passwordInput = document.getElementById("password");

        togglePasswordBtn.addEventListener("click", () => {

            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";

            const icon = togglePasswordBtn.querySelector("i");
            icon.classList.toggle("fa-eye-slash");
            icon.classList.toggle("fa-eye");

        });


        // Google Login
        document.getElementById("google-login").addEventListener("click", async (e) => {

            e.preventDefault();

            const { error } = await supabaseClient.auth.signInWithOAuth({

                provider: "google",

                options: {

                    redirectTo: "http://localhost:5500/frontend-customer/auth_callback.html",

                    queryParams: {
                        access_type: "offline",
                        prompt: "select_account"
                    }

                }

            });

            if (error) {
                alert(error.message);
            }

        });
        document.querySelector(".login-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert(error.message);
                return;
            }

            // update login time
            await supabaseClient
                .from("customers")
                .update({
                    last_login: new Date().toISOString()
                })
                .eq("id", data.user.id);

            window.location.href = "/frontend-customer/customer_booking.html";
        });
    </script>
</body>

</html>
