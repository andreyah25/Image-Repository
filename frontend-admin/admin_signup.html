<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started - Vanity Creation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/design/admin_signup.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="login-wrapper">

    <div class="left-panel">
      <h1 class="welcome-heading">Get Started</h1>
      <p class="welcome-subtext">Create your account in seconds.</p>
    </div>

    <div class="login-card-container">

      <form class="login-form" id="staffSignUpForm">

        <div class="input-group">
          <input type="text" id="fullName" autocomplete="name" required placeholder=" ">
          <label for="fullName">Full Name</label>
        </div>

        <div class="input-group">
          <input type="email" id="email" autocomplete="email" required placeholder=" ">
          <label for="email">Email Address</label>
        </div>

        <div class="input-group password-group">
          <input type="password" id="password" autocomplete="new-password" required placeholder=" ">
          <label for="password">Password</label>

          <button type="button" class="toggle-password" id="passwordToggle">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>

        <button type="submit" class="submit-login-btn">
          Sign up
        </button>

        <p class="signup-footer-text">
          Already have an account? <a href="admin_login.html">Log in</a>
        </p>

      </form>

    </div>


  </div>
  <script>
    const SUPABASE_URL = "https://rprcbeabdvxdenmngxxc.supabase.co";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwcmNiZWFiZHZ4ZGVubW5neHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTAxMTgsImV4cCI6MjA5ODg4NjExOH0.SS0BKTXRBiu1Cclr_1ZRvte4UNnevinwqJAKOX9tLvw";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );
    document.getElementById("staffSignUpForm").addEventListener("submit", async (e) => {

      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName
          }
        }
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Account created successfully!");
      window.location.href = "admin_login.html";
    });
  </script>


</body>

</html>
